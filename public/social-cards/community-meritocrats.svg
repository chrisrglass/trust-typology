<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f6f1"/>
      <stop offset="100%" stop-color="#edeae2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="10" fill="#1F6B4F"/>

  <!-- Accent left rule -->
  <rect x="80" y="120" width="4" height="240" fill="#1F6B4F" opacity="0.4"/>

  <!-- Eyebrow -->
  <text x="96" y="148" font-family="Arial,'Helvetica Neue',sans-serif" font-size="20" letter-spacing="3" fill="#1F6B4F" font-weight="700" text-transform="uppercase">THE TRUST TYPOLOGY  ·  ~12% of Americans</text>

  <!-- Type name -->
  <text x="96" y="260" font-family="Georgia,'Times New Roman',serif" font-size="88" fill="#111" font-weight="700" line-height="1">Self-Made Meritocrats</text>

  <!-- Divider -->
  <rect x="80" y="310" width="120" height="3" fill="#1F6B4F"/>

  <!-- Tagline -->
  <text x="80" y="520" font-family="Georgia,'Times New Roman',serif" font-size="34" fill="#3a3a3a" font-style="italic">The degree pays off, if you choose wisely, commit</text>
  <text x="80" y="572" font-family="Georgia,'Times New Roman',serif" font-size="34" fill="#3a3a3a" font-style="italic">fully, and take responsibility for the outcome.</text>

  <!-- Footer area -->
  <rect x="0" y="590" width="1200" height="40" fill="#1F6B4F" opacity="0.08"/>

  <!-- Two circles logo -->
  <circle cx="88" cy="610" r="11" fill="none" stroke="#1F6B4F" stroke-width="2" opacity="0.7"/>
  <circle cx="102" cy="610" r="11" fill="none" stroke="#1F6B4F" stroke-width="2" opacity="0.7"/>

  <!-- URL -->
  <text x="124" y="615" font-family="Arial,'Helvetica Neue',sans-serif" font-size="18" letter-spacing="2" fill="#1F6B4F" font-weight="700">TRUSTTYPOLOGY.COM</text>
</svg>