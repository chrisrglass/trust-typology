<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Roboto+Condensed:wght@300;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 40px;
  }
  .label {
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
  }
</style>
<title>Trust Typology — Brand Art</title>
</head>
<body>
<div class="wrap">
  <div class="label">Trust Typology · Brand Art · 1200×1200</div>

  <!--
    ═══════════════════════════════════════════════════════════════════════════
    TRUST TYPOLOGY BRAND ART — v1
    Bauhaus grid. Dark field. Seven types. Proportions reflect prevalence.
    1200 × 1200 px. Screenshot at full size or export as PNG via browser.
    ═══════════════════════════════════════════════════════════════════════════

    Grid anatomy:
      Title band   y:0    h:160
      ─ 3px gap (background) ─
      Row 1        y:163  h:380   [Econ. Betrayed 672px | Populist Insurgents 525px]
      ─ 3px gap ─
      Row 2        y:546  h:300   [Univ. Defenders 399px | Critical Reformers 399px | Inst. Skeptics 396px]
      ─ 3px gap ─
      Row 3        y:849  h:348   [Self-Made Meritocrats 598px | Countercultural Classicists 599px]
      ─ 3px gap ─

    Cell widths in each row are proportional (roughly) to type prevalence
    within that row — making the grid itself a data object.
  -->

  <svg
    width="720" height="720"
    viewBox="0 0 1200 1200"
    xmlns="http://www.w3.org/2000/svg"
    style="display:block;border:1px solid rgba(255,255,255,0.08);"
  >

    <!-- ── Background ─────────────────────────────────────────────────────── -->
    <rect width="1200" height="1200" fill="#0f0f0f"/>

    <!-- ── TITLE BAND  y:0  h:160 ─────────────────────────────────────────── -->

    <!-- "TRUST" — Roboto Condensed Bold, geometric weight -->
    <text
      x="600" y="90"
      text-anchor="middle"
      font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
      font-size="88"
      font-weight="700"
      letter-spacing="6"
      fill="#ffffff"
    >TRUST</text>

    <!-- "TYPOLOGY" — Playfair Display Italic, editorial weight -->
    <text
      x="600" y="141"
      text-anchor="middle"
      font-family="'Playfair Display', Georgia, serif"
      font-size="37"
      font-weight="900"
      font-style="italic"
      letter-spacing="20"
      fill="rgba(255,255,255,0.52)"
    >TYPOLOGY</text>

    <!-- ── ROW 1  y:163  h:380 ─────────────────────────────────────────────── -->

    <!-- ┌─────────────────────────────────┬──────────────────────────┐ -->
    <!-- │  ECONOMICALLY BETRAYED  ~22%    │  POPULIST INSURGENTS ~17%│ -->
    <!-- │  #A3171C · TrendingDown         │  #C46A2D · Megaphone     │ -->
    <!-- └─────────────────────────────────┴──────────────────────────┘ -->

    <!-- Cell 1 · Economically Betrayed · #A3171C  x:0 w:672 -->
    <rect x="0" y="163" width="672" height="380" fill="#A3171C"/>
    <!-- TrendingDown icon centered at (336, 320) — 80×80 -->
    <svg x="296" y="280" width="80" height="80" viewBox="0 0 24 24"
         fill="none" stroke="white" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>
      <polyline points="17 18 23 18 23 12"/>
    </svg>
    <text x="336" y="391"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="12" font-weight="700" letter-spacing="2.5"
          fill="rgba(255,255,255,0.88)">ECONOMICALLY BETRAYED</text>
    <text x="336" y="411"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="11" letter-spacing="1.5"
          fill="rgba(255,255,255,0.4)">~22% of Americans</text>

    <!-- Cell 2 · Populist Insurgents · #C46A2D  x:675 w:525 -->
    <rect x="675" y="163" width="525" height="380" fill="#C46A2D"/>
    <!-- Megaphone icon centered at (937, 320) — 80×80 -->
    <svg x="897" y="280" width="80" height="80" viewBox="0 0 24 24"
         fill="none" stroke="white" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="m3 11 18-5v12L3 13v-2z"/>
      <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>
    </svg>
    <text x="937" y="391"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="12" font-weight="700" letter-spacing="2.5"
          fill="rgba(255,255,255,0.88)">POPULIST INSURGENTS</text>
    <text x="937" y="411"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="11" letter-spacing="1.5"
          fill="rgba(255,255,255,0.4)">~17% of Americans</text>

    <!-- ── ROW 2  y:546  h:300 ─────────────────────────────────────────────── -->

    <!-- ┌──────────────────┬───────────────────┬──────────────────────┐ -->
    <!-- │ UNIV. DEFENDERS  │ CRITICAL REFORMERS│ INSTITUTIONAL SKEPTICS│ -->
    <!-- │ #2457A6 · Shield │ #6E3B6E · Eye     │ #7A7068 · CircleDash │ -->
    <!-- └──────────────────┴───────────────────┴──────────────────────┘ -->

    <!-- Cell 3 · University Defenders · #2457A6  x:0 w:399 -->
    <rect x="0" y="546" width="399" height="300" fill="#2457A6"/>
    <!-- Shield icon centered at (199, 672) — 60×60 -->
    <svg x="169" y="642" width="60" height="60" viewBox="0 0 24 24"
         fill="none" stroke="white" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <text x="199" y="725"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="11" font-weight="700" letter-spacing="2.5"
          fill="rgba(255,255,255,0.88)">UNIVERSITY DEFENDERS</text>
    <text x="199" y="743"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="10.5" letter-spacing="1.5"
          fill="rgba(255,255,255,0.4)">~15% of Americans</text>

    <!-- Cell 4 · Critical Reformers · #6E3B6E  x:402 w:399 -->
    <rect x="402" y="546" width="399" height="300" fill="#6E3B6E"/>
    <!-- Eye icon centered at (601, 672) — 60×60 -->
    <svg x="571" y="642" width="60" height="60" viewBox="0 0 24 24"
         fill="none" stroke="white" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <text x="601" y="725"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="11" font-weight="700" letter-spacing="2.5"
          fill="rgba(255,255,255,0.88)">CRITICAL REFORMERS</text>
    <text x="601" y="743"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="10.5" letter-spacing="1.5"
          fill="rgba(255,255,255,0.4)">~12% of Americans</text>

    <!-- Cell 5 · Institutional Skeptics · #7A7068  x:804 w:396 -->
    <rect x="804" y="546" width="396" height="300" fill="#7A7068"/>
    <!-- CircleDashed icon centered at (1002, 672) — 60×60 -->
    <svg x="972" y="642" width="60" height="60" viewBox="0 0 24 24"
         fill="none" stroke="white" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10" stroke-dasharray="4.5 2.5"/>
    </svg>
    <text x="1002" y="725"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="11" font-weight="700" letter-spacing="2.5"
          fill="rgba(255,255,255,0.88)">INSTITUTIONAL SKEPTICS</text>
    <text x="1002" y="743"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="10.5" letter-spacing="1.5"
          fill="rgba(255,255,255,0.4)">~10% of Americans</text>

    <!-- ── ROW 3  y:849  h:348 ─────────────────────────────────────────────── -->

    <!-- ┌───────────────────────────────┬──────────────────────────────┐ -->
    <!-- │  SELF-MADE MERITOCRATS  ~12%  │  COUNTERCULTURAL CLASSICISTS │ -->
    <!-- │  #1F6B4F · Users              │  #B78A2A · Star       ~11%   │ -->
    <!-- └───────────────────────────────┴──────────────────────────────┘ -->

    <!-- Cell 6 · Self-Made Meritocrats · #1F6B4F  x:0 w:598 -->
    <rect x="0" y="849" width="598" height="348" fill="#1F6B4F"/>
    <!-- Users icon centered at (299, 990) — 70×70 -->
    <svg x="264" y="955" width="70" height="70" viewBox="0 0 24 24"
         fill="none" stroke="white" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    <text x="299" y="1048"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="11" font-weight="700" letter-spacing="2.5"
          fill="rgba(255,255,255,0.88)">SELF-MADE MERITOCRATS</text>
    <text x="299" y="1066"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="10.5" letter-spacing="1.5"
          fill="rgba(255,255,255,0.4)">~12% of Americans</text>

    <!-- Cell 7 · Countercultural Classicists · #B78A2A  x:601 w:599 -->
    <rect x="601" y="849" width="599" height="348" fill="#B78A2A"/>
    <!-- Star icon centered at (900, 990) — 70×70 -->
    <svg x="865" y="955" width="70" height="70" viewBox="0 0 24 24"
         fill="none" stroke="white" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    <text x="900" y="1048"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="11" font-weight="700" letter-spacing="2.5"
          fill="rgba(255,255,255,0.88)">COUNTERCULTURAL CLASSICISTS</text>
    <text x="900" y="1066"
          text-anchor="middle"
          font-family="'Roboto Condensed', 'Arial Narrow', sans-serif"
          font-size="10.5" letter-spacing="1.5"
          fill="rgba(255,255,255,0.4)">~11% of Americans</text>

    <!-- ── Outer frame (hair-thin, barely visible) ──────────────────────────── -->
    <rect x="0.5" y="0.5" width="1199" height="1199"
          fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  </svg>

  <div class="label" style="margin-top:4px;">
    Open in browser · Screenshot the SVG to export at display size · Or resize SVG width/height to 1200 for 1:1 export
  </div>
</div>
</body>
</html>
